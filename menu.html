    <style>
        body {

            font-family: Arial;
        }

        /* Table styling */
        table {
            width: 60%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        /* Box Model */
        td, th {
            border: 2px solid black;
            padding: 10px;
            margin: 5px;
            text-align: center;
        }
	
	td img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }

        /* Header style */
        h2 {
            text-align: center;
            color: blue;
        }

        /* Positioning */
        .table-container {
            position: relative;
            top: 20px;
        }

        /* Dropdown Menu */
        .dropdown {
            text-align: center;
            margin-bottom: 20px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: lightgray;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* CSS3 hover */
        tr:hover {
            background-color: lightblue;
        }
    </style>
