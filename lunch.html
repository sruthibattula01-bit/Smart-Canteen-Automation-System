<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lunch</title>

    <style>
        body {
            text-align: center;
            background-color: #e9ebf7;
            font-family: Arial;
        }

        table {
            margin: auto;
        }

        img {
            width: 80px;
            height: 80px;
        }

        button {
            padding: 8px;
            background-color: orange;
        }

        button:hover {
            background-color: green;
        }
    </style>

    <script>
        function addItem(item, price, id) {
            var qty = document.getElementById(id).value;

            if (qty == "" || qty <= 0) {
                alert("Enter quantity");
                return;
            }

            var cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.push(item + " x " + qty + " = ₹" + (price * qty));

            localStorage.setItem("cart", JSON.stringify(cart));

            alert("1 item added to cart");

            document.getElementById(id).value = "";
        }
    </script>
</head>

<body>

    <h2 style="color:#1d055c;">Lunch Menu</h2>

    <table border="1" cellpadding="14" cellspacing="0">
        <tr>
            <th>Item</th>
            <th>Image</th>
            <th>Quantity</th>
            <th>Add</th>
        </tr>

        <tr>
            <td>Meals</td>
            <td><img src="meals"></td>
            <td><input type="number" id="meals"></td>
            <td><button onclick="addItem('Meals',80,'meals')">Add</button></td>
        </tr>

        <tr>
            <td>Biryani</td>
            <td><img src="biryani"></td>
            <td><input type="number" id="biryani"></td>
            <td><button onclick="addItem('Biryani',120,'biryani')">Add</button></td>
        </tr>

        <tr>
            <td>Fried Rice</td>
            <td><img src="lunch"></td>
            <td><input type="number" id="friedrice"></td>
            <td><button onclick="addItem('Fried Rice',90,'friedrice')">Add</button></td>
        </tr>

        <tr>
            <td>Curd Rice</td>
            <td><img src="curdrice"></td>
            <td><input type="number" id="curdrice"></td>
            <td><button onclick="addItem('Curd Rice',60,'curdrice')">Add</button></td>
        </tr>
    </table>

    <br><br>

    <a href="menu.html">⬅ Back to Menu</a> |
    <a href="cart.html">Go to Cart ➡</a>

</body>
</html>
